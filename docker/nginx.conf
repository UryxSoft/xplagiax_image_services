# ============================================================
# Nginx — reverse proxy + rate limiting for xplagiax API
# Place at: /etc/nginx/conf.d/xplagiax.conf
# ============================================================

# Per-IP rate limiting zones
# Zone 1: burst protection — 10 req/s with burst of 20
limit_req_zone $binary_remote_addr zone=api_burst:10m rate=10r/s;
# Zone 2: sustained limit — 200 req/min = ~3.3 req/s
limit_req_zone $binary_remote_addr zone=api_sustained:10m rate=200r/m;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

upstream xplagiax_api {
    server api:5000;
    keepalive 32;          # persistent connections to Gunicorn
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS in production
    # (comment out if terminating TLS at load balancer)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.xplagiax.com;   # replace with your domain

    # TLS — managed by certbot or mounted from secret
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "DENY"           always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "no-referrer"    always;
    add_header Content-Security-Policy "default-src 'none'" always;

    # Maximum upload size (must match MAX_IMAGE_BYTES env var)
    client_max_body_size 21M;
    client_body_timeout  60s;
    client_header_timeout 10s;

    # Timeouts for ML inference
    proxy_read_timeout  120s;
    proxy_send_timeout  30s;
    proxy_connect_timeout 5s;

    # Health probes — no rate limiting
    location /healthz {
        proxy_pass http://xplagiax_api;
        proxy_set_header Host $host;
        access_log off;        # don't pollute logs with health checks
    }

    location /readyz {
        proxy_pass http://xplagiax_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # API routes — rate limited
    location /api/ {
        # Burst: allow 20 queued requests, then 429
        limit_req zone=api_burst     burst=20  nodelay;
        limit_req zone=api_sustained burst=200 nodelay;
        limit_conn api_conn 50;

        limit_req_status 429;
        limit_conn_status 429;

        proxy_pass http://xplagiax_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        # Disable buffering for large uploads
        proxy_request_buffering off;
        proxy_buffering         off;

        # Connection reuse
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Block everything else
    location / {
        return 404 '{"error":"Not found","code":"NOT_FOUND"}';
        add_header Content-Type application/json;
    }

    # Logging
    access_log /var/log/nginx/xplagiax_access.log combined;
    error_log  /var/log/nginx/xplagiax_error.log warn;
}
